---
deployment:
  tasks:
    - export APPPATH=/home/sishrdmy/apps/hrdsystem
    - export PUBLICPATH=/home/sishrdmy/public_html
    - /bin/mkdir -p $APPPATH
    - /bin/mkdir -p $PUBLICPATH

    - /bin/cp -R app $APPPATH
    - /bin/cp -R bootstrap $APPPATH
    - /bin/cp -R config $APPPATH
    - /bin/cp -R database $APPPATH
    - /bin/cp -R lang $APPPATH
    - /bin/cp -R resources $APPPATH
    - /bin/cp -R routes $APPPATH
    - /bin/cp -R storage $APPPATH

    - if [ -d vendor ]; then /bin/cp -R vendor $APPPATH; fi
    - if [ -f artisan ]; then /bin/cp artisan $APPPATH; fi
    - if [ -f composer.json ]; then /bin/cp composer.json $APPPATH; fi
    - if [ -f composer.lock ]; then /bin/cp composer.lock $APPPATH; fi
    - if [ -f .env.example ]; then /bin/cp .env.example $APPPATH; fi

    - if [ -f public/index.php ]; then /bin/cp public/index.php $PUBLICPATH; fi
    - if [ -f public/.htaccess ]; then /bin/cp public/.htaccess $PUBLICPATH; fi
    - if [ -d public/build ]; then /bin/cp -R public/build $PUBLICPATH; fi
    - if [ -f public/favicon.ico ]; then /bin/cp public/favicon.ico $PUBLICPATH; fi
    - if [ -f public/robots.txt ]; then /bin/cp public/robots.txt $PUBLICPATH; fi